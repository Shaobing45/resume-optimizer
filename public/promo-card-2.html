<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>图2</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f1f5f9;font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:16px;background:#fff;padding:24px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.label{font-size:12px;color:#94a3b8;margin-bottom:12px;text-align:center}
.comp{flex:1;display:flex;gap:10px;position:relative}
.half{flex:1;border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:center}
.old{background:#fef2f2}.new{background:#f0fdf4}
.half h3{font-size:12px;font-weight:700;margin-bottom:10px}
.old h3{color:#dc2626}.new h3{color:#16a34a}
.l{font-size:10px;color:#475569;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.b{margin-top:8px;display:inline-block;padding:4px 10px;border-radius:8px;font-size:9px;background:#f1f5f9;color:#64748b}
.arrow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:20px;color:#2563eb;background:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.footer{text-align:center;margin-top:12px;padding:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:10px;font-size:13px;font-weight:700}
</style></head><body>
<div class="card">
<p class="label">优化前后对比 · 真实案例</p>
<div class="comp">
<div class="half old"><h3>❌ 优化前</h3><div class="l">负责公司产品的日常运营</div><div class="l">参与多个项目开发</div><div class="l">协助团队完成任务</div><div style="margin-top:8px"><span class="b">ATS 匹配度 35%</span></div></div>
<div class="half new"><h3>✅ 优化后</h3><div class="l">主导产品从0到1·日活50w</div><div class="l">重构架构·响应降60%</div><div class="l">推动自动化·覆盖85%</div><div style="margin-top:8px"><span class="b" style="background:#dcfce7;color:#16a34a">ATS 匹配度 92%</span></div></div>
<div class="arrow">→</div>
</div>
<div class="footer">30% 免费预览 · ¥9.9 起</div>
</div>
</body></html>
