<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>图3</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f1f5f9;font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:16px;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.circle{width:110px;height:110px;border-radius:50%;background:conic-gradient(#22c55e 0deg 280deg,#374151 280deg);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.inner{width:88px;height:88px;border-radius:50%;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center}
.num{font-size:36px;font-weight:900;color:#22c55e}.lb{font-size:10px;color:#94a3b8}
.label{color:#f1f5f9;font-size:14px;font-weight:600}
.change{display:flex;align-items:center;gap:12px;margin-top:6px}
.old{font-size:14px;color:#64748b;text-decoration:line-through}
.new{font-size:18px;font-weight:700;color:#22c55e}
.tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.t{padding:5px 14px;border-radius:20px;font-size:11px;background:rgba(34,197,94,.15);color:#86efac}
.tm{background:rgba(239,68,68,.15);color:#fca5a5}
.price{margin-top:18px;padding:10px 28px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:10px;color:#fff;font-size:14px;font-weight:700}
</style></head><body>
<div class="card">
<div class="circle"><div class="inner"><span class="num">92</span><span class="lb">/ 100</span></div></div>
<p class="label">ATS 关键词匹配度</p>
<div class="change"><span class="old">35%</span><span style="color:#64748b;font-size:13px">→</span><span class="new">92%</span></div>
<div class="tags"><span class="t">✅ React</span><span class="t">✅ TypeScript</span><span class="t">✅ 微服务</span><span class="tm">⚠️ 性能优化</span><span class="tm">⚠️ Docker</span></div>
<div class="price">¥9.9 起 · 先看效果再付款</div>
</div>
</body></html>
