<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>图1</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f1f5f9;font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:16px;background:linear-gradient(135deg,#1e3a5f,#0f172a);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.2)}

h1 span{background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:13px;color:#94a3b8;margin-top:14px;z-index:1;position:relative;line-height:1.6}
.url{margin-top:20px;padding:12px 24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:15px;color:#fff;font-weight:600;letter-spacing:1px;z-index:1;position:relative}
