<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>图4</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f1f5f9;font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:16px;background:#fff;padding:24px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.1)}
h2{font-size:17px;color:#0f172a;margin-bottom:12px;text-align:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1}
.t{border:2px solid #e2e8f0;border-radius:12px;padding:14px 8px;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:#475569}
.t .i{font-size:22px;margin-bottom:4px}.t .n{font-weight:600;font-size:12px}
.t.active{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.sub{text-align:center;font-size:11px;color:#94a3b8;margin:10px 0}
.price{text-align:center;padding:12px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:10px;font-size:14px;font-weight:700}
</style></head><body>
<div class="card">
<h2>🎨 5 套专业简历模板</h2>
<div class="grid">
<div class="t active"><span class="i">📄</span><span class="n">经典单栏</span><span style="font-size:9px;color:#2563eb;margin-top:2px">· 最受欢迎</span></div>
<div class="t"><span class="i">✨</span><span class="n">现代简洁</span></div>
<div class="t"><span class="i">💻</span><span class="n">技术简约</span><span style="font-size:9px;color:#64748b;margin-top:2px">· 技能突出</span></div>
<div class="t"><span class="i">🔴</span><span class="n">红框时间轴</span></div>
</div>
<p class="sub">+ 蓝边时间轴（共 5 套）</p>
<div class="price">30% 免费预览 · ¥9.9 起</div>
</div>
</body></html>
